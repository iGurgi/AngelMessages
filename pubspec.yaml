name: angel_messages
description: "Daily inspirational messages from angels"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.3 <4.0.0'
  flutter: ">=3.24.3"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: 2.5.1
  isar: 3.1.0+1
  isar_flutter_libs: 3.1.0+1
  dio: 5.4.3+1
  go_router: 14.2.7
  flutter_local_notifications: 17.2.3
  timezone: 0.9.4
  permission_handler: 11.3.1
  freezed: 2.5.7
  json_annotation: 4.9.0
  shared_preferences: 2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: 1.0.4
  build_runner: 2.4.12
  json_serializable: 6.8.0
  isar_generator: 3.1.0+1
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/
