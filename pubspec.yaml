name: AngelMessages
description: A personal Flutter app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Immutable models + unions
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # HTTP
  dio: ^5.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true