name: CI

on:
  push:
    branches: [main, 'agent-studio/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get --no-example
      
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test
      
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
      
      - name: Run tests with coverage
        run: flutter test --coverage --reporter=expanded
      
      - name: Check coverage threshold
        run: |
          # Install lcov if not present
          if ! command -v lcov &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y lcov
          fi
          
          # Generate coverage report
          lcov --summary coverage/lcov.info || true
          
          # Check if coverage is at least 80%
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep "lines" | awk '{print $2}' | sed 's/%//' || echo "0")
          echo "Coverage: $COVERAGE%"
          
          # Skip coverage check if no coverage data
          if [ "$COVERAGE" = "0" ]; then
            echo "No coverage data, skipping threshold check"
            exit 0
          fi
          
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage is below 80%: $COVERAGE%"
            exit 1
          fi
          echo "Coverage is acceptable: $COVERAGE%"

  build-android:
    runs-on: ubuntu-22.04
    needs: analyze-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Get dependencies
        run: flutter pub get --no-example
      
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Build APK
        run: flutter build apk --debug --no-pub

  build-ios:
    runs-on: macos-14
    needs: analyze-and-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Get dependencies
        run: flutter pub get --no-example
      
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs
      
      - name: Install CocoaPods
        run: |
          gem install cocoapods -v 1.15.2
      
      - name: Pod install
        working-directory: ios
        run: pod install
      
      - name: Build iOS
        run: flutter build ios --no-codesign --debug --no-pub
