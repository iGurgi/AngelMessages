name: CI

on:
  push:
    branches: [ main, develop, 'agent-studio/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies (ignore errors for codegen)
        run: flutter pub get || true

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install dependencies again (after codegen)
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test --coverage --reporter=expanded

      - name: Check code coverage
        run: |
          flutter pub global activate coverage
          flutter pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib || true
          
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies (ignore errors for codegen)
        run: flutter pub get || true

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install dependencies again (after codegen)
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

  build-ios:
    name: Build iOS
    runs-on: macos-14
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies (ignore errors for codegen)
        run: flutter pub get || true

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install dependencies again (after codegen)
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
