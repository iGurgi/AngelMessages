<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Angel wings background -->
  <path d="M7.5 12c-1.5-3-3-4.5-4.5-4.5C1.5 7.5 1 8.5 1.5 9.5c1 2 3 3.5 6 2.5z" fill="#E1BEE7" opacity="0.6"/>
  <path d="M16.5 12c1.5-3 3-4.5 4.5-4.5c1.5 0 2 1 1.5 2-1 2-3 3.5-6 2.5z" fill="#E1BEE7" opacity="0.6"/>
  
  <!-- Main clock circle -->
  <circle cx="12" cy="12" r="7" fill="#FFFFFF" stroke="#7B1FA2" stroke-width="1.5"/>
  
  <!-- Clock face markers -->
  <circle cx="12" cy="6" r="0.8" fill="#7B1FA2"/>
  <circle cx="18" cy="12" r="0.8" fill="#7B1FA2"/>
  <circle cx="12" cy="18" r="0.8" fill="#7B1FA2"/>
  <circle cx="6" cy="12" r="0.8" fill="#7B1FA2"/>
  
  <!-- Hour markers (smaller) -->
  <circle cx="15.2" cy="8.8" r="0.4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="15.2" cy="15.2" r="0.4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="8.8" cy="15.2" r="0.4" fill="#9C27B0" opacity="0.7"/>
  <circle cx="8.8" cy="8.8" r="0.4" fill="#9C27B0" opacity="0.7"/>
  
  <!-- Clock hands -->
  <line x1="12" y1="12" x2="12" y2="8" stroke="#7B1FA2" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="14.5" y2="12" stroke="#7B1FA2" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="12" cy="12" r="1.2" fill="#7B1FA2"/>
  
  <!-- Angel halo above -->
  <ellipse cx="12" cy="5" rx="3" ry="1" fill="none" stroke="#AB47BC" stroke-width="1" opacity="0.8"/>
  
  <!-- Subtle sparkle effects -->
  <path d="M19 6l0.5-1 0.5 1-1 0.5 1 0.5-0.5 1-0.5-1-1-0.5 1-0.5z" fill="#CE93D8" opacity="0.6"/>
  <path d="M5 18l0.3-0.6 0.3 0.6-0.6 0.3 0.6 0.3-0.3 0.6-0.3-0.6-0.6-0.3 0.6-0.3z" fill="#CE93D8" opacity="0.6"/>
</svg>